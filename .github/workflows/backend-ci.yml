name: CI Backend - Mentoria Ágil

on:
  push:
    branches: [ main, desenvolvimento, correcao-bugs ]
    
  pull_request:
    branches: [ main, desenvolvimento, correcao-bugs ]
      
jobs:
  build-and-analyze:
    name: Build, Testes e SonarCloud
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código (histórico completo para SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Cache dos pacotes do SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Executa os testes carregando o application-test.properties
      # O JaCoCo vai gerar o relatório auto durante fase de verify
      - name: Compilar e Executar Testes com Perfil de Teste
        run: mvn clean verify -Ptest -Dspring.profiles.active=test

      # Envia os resultados para o SonarCloud incluindo o relatório do JaCoCo
      - name: Executar Análise SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=MentoriaAgil_Backend \
            -Dsonar.organization=mentoria-agil \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Upload do Relatório de Cobertura (Artefacto)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
